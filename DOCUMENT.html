<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNiko Merch</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { background-color: #111; color: #fff; width: 100%; text-align: center; padding: 20px 0; font-size: 24px; font-weight: bold; letter-spacing: 1px; }
        
        /* Cart Styles */
        #cart { background: #eee; width: 90%; max-width: 800px; margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; border: 2px dashed #333; }
        
        .banner { width: 90%; max-width: 300px; margin-top: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .store-container { margin: 40px auto; max-width: 1200px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .product-card { background: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; padding: 20px; transition: transform 0.2s; }
        .product-card img { max-width: 100%; height: auto; border-radius: 4px; }
        .product-title { font-size: 22px; margin: 15px 0 10px 0; color: #333; }
        .product-price { font-size: 18px; color: #e67e22; font-weight: bold; margin-bottom: 15px; }
        .buy-btn { background-color: #111; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; transition: background 0.2s; }
        .buy-btn:hover { background-color: #444; }
    </style>
</head>
<body>

    <header>iNiko Store</header>

    <div id="cart">
        <h3>Shopping Cart</h3>
        <p>Items: <span id="item-count">0</span> | Total: <span id="total-price">0</span> RON</p>
    </div>

    <img src="Vara asta.jfif" alt="iNiko Banner" class="banner">

    <main class="store-container">
        <!-- Products -->
        <div class="product-card">
            <img src="iNiko Merch Shirt 1 fata.jfif" alt="Shirt">
            <h2 class="product-title">iNiko Official Shirt</h2>
            <div class="product-price">60,00 RON</div>
            <button class="buy-btn" onclick="addToCart(60)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Pantaloni iNiko.jfif" alt="Pants">
            <h2 class="product-title">iNiko Pants</h2>
            <div class="product-price">60,00 RON</div>
            <button class="buy-btn" onclick="addToCart(60)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Sapca iNiko.jfif" alt="Cap">
            <h2 class="product-title">iNiko Cap</h2>
            <div class="product-price">50,00 RON</div>
            <button class="buy-btn" onclick="addToCart(50)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Plushie iNiko.jfif" alt="Plushie">
            <h2 class="product-title">iNiko Plushie</h2>
            <div class="product-price">100,00 RON</div>
            <button class="buy-btn" onclick="addToCart(100)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Ochelari iNiko.jfif" alt="Sunglasses">
            <h2 class="product-title">iNiko Sunglasses</h2>
            <div class="product-price">65,00 RON</div>
            <button class="buy-btn" onclick="addToCart(65)">Add to Cart</button>
        </div>
    </main>

    <script>
        let count = 0;
        let total = 0;
        function addToCart(price) {
            count++;
            total += price;
            document.getElementById('item-count').innerText = count;
            document.getElementById('total-price').innerText = total;
        }
    </script>

</body>
</html>
