<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNiko Merch</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #111;
            color: #fff;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .banner {
            width: 90%;
            max-width: 300px; /* This makes the image smaller */
            margin-top: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .store-container {
            margin: 40px auto;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .product-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
            padding: 20px;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .product-title {
            font-size: 22px;
            margin: 15px 0 10px 0;
            color: #333;
        }

        .product-price {
            font-size: 18px;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: #111;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

    <header>
        iNiko Store
    </header>

    <!-- Banner Image -->
    <img src="Vara asta.jfif" alt="iNiko Banner" class="banner">

    <main class="store-container">
        <!-- Shirt -->
        <div class="product-card">
           <img src="iNiko Merch Shirt 1 fata.jfif" alt="iNiko Merch">
            <h2 class="product-title">iNiko Official Shirt</h2>
            <div class="product-price">60,00 RON</div>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <!-- Pants -->
        <div class="product-card">
           <img src="Pantaloni iNiko.jfif" alt="iNiko Pants">
            <h2 class="product-title">iNiko Pants</h2>
            <div class="product-price">80,00 RON</div>
            <button class="buy-btn">Add to Cart</button>
        </div>
    </main>

</body>
</html>
