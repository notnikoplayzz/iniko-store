<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNiko Store</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; margin: 0; padding: 0; }
        header { background: #111; color: #fff; padding: 20px; }
        
        .product-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; justify-items: center; }
        
        .product-card { width: 90%; max-width: 300px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: auto; border-radius: 4px; }
        .buy-btn { background: #111; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        
        /* Draggable Cart Styles */
        #cart-modal { 
            display: none; 
            position: fixed; 
            top: 10%; 
            left: 5%; 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            padding: 20px; 
            border: 2px solid #333; 
            z-index: 10; 
            border-radius: 8px;
            cursor: move;
        }
    </style>
</head>
<body>

    <header><h1>iNiko Store</h1></header>

    <button style="padding: 15px; margin: 20px;" onclick="document.getElementById('cart-modal').style.display='block'">View Shopping Cart</button>

    <div id="cart-modal">
        <h2>Your Cart</h2>
        <ul id="cart-items" style="text-align: left;"><li>Empty</li></ul>
        <p><strong>Total: <span id="total-price">0</span> RON</strong></p>
        <button onclick="document.getElementById('cart-modal').style.display='none'">Close</button>
    </div>

    <main class="product-container">
        <div class="product-card">
            <img src="iNiko Merch Shirt 1 fata.jfif" alt="Shirt">
            <h3>iNiko Official Shirt</h3>
            <p>60 RON</p>
            <button class="buy-btn" onclick="addToCart('iNiko Official Shirt', 60)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="Pantaloni iNiko.jfif" alt="Pants">
            <h3>iNiko Pants</h3>
            <p>60 RON</p>
            <button class="buy-btn" onclick="addToCart('iNiko Pants', 60)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="Sapca iNiko.jfif" alt="Cap">
            <h3>iNiko Cap</h3>
            <p>50 RON</p>
            <button class="buy-btn" onclick="addToCart('iNiko Cap', 50)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="Plushie iNiko.jfif" alt="Plushie">
            <h3>iNiko Plushie</h3>
            <p>100 RON</p>
            <button class="buy-btn" onclick="addToCart('iNiko Plushie', 100)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="Ochelari iNiko.jfif" alt="Sunglasses">
            <h3>iNiko Sunglasses</h3>
            <p>65 RON</p>
            <button class="buy-btn" onclick="addToCart('iNiko Sunglasses', 65)">Add to Cart</button>
        </div>
    </main>

    <script>
        let total = 0;
        function addToCart(name, price) {
            const list = document.getElementById('cart-items');
            if (total === 0) list.innerHTML = '';
            let li = document.createElement('li');
            li.innerText = name + " - " + price + " RON";
            list.appendChild(li);
            total += price;
            document.getElementById('total-price').innerText = total;
        }

        // Draggable Logic
        const modal = document.getElementById("cart-modal");
        let isDragging = false;
        let offsetX, offsetY;

        modal.addEventListener("mousedown", (e) => {
            isDragging = true;
            offsetX = e.clientX - modal.offsetLeft;
            offsetY = e.clientY - modal.offsetTop;
        });

        document.addEventListener("mousemove", (e) => {
            if (isDragging) {
                modal.style.left = (e.clientX - offsetX) + "px";
                modal.style.top = (e.clientY - offsetY) + "px";
            }
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
        });
    </script>
</body>
</html>
